<script>
const state = {
  roster: null,
  members: [],

  // NEW
  memberMap: {},
  rosterButtons: {},
  historyCache: {},
  auditCache: {},

  selectedId: "",
  filter: "All",
  search: "",

  headshotQueue: [],
  headshotLoading: false,
  headshotRenderId: 0,
  headshotImageCache: {},
  searchTimer: null,

  migrationReady: false,
  migrationBusy: false,

  performanceHistoryRequestId: 0
};

  const $ = id => document.getElementById(id);

  const textFields = [
    "memberId","status","department","roleTitle","legalName",
    "professionalName","displayName","pronouns","publicPronouns",
    "email","phone","address","birthday","favoriteBirthdayTreat",
    "emergencyContactName","emergencyContactRelationship",
    "emergencyContactPhone","allergiesPrivateNotes","headshot",
    "startDate","endDate","returnDate"
  ];

  const checkboxFields = [
    "sameAsLegalName","shareEmail","sharePhone","shareAddress",
    "shareBirthday","shareProfessionalName","sharePronouns"
  ];

  function init() {
    setMessage("Loading CompanyOS...");
    google.script.run
      .withSuccessHandler(loadState)
      .withFailureHandler(showError)
      .getCompanyOSDialogState();
  }

  function loadState(data) {
    state.roster = data || {};
    refreshClientRosterState_((data && data.members) || []);

    fillSelect($("status"), data.statuses || []);
    fillSelect($("department"), data.departments || []);
    renderRoster();
    setMessage("");

    if (!state.members.length) {
      showEmpty();
      return;
    }

    const firstId =
      state.selectedId &&
      state.members.some(member => member.memberId === state.selectedId)
        ? state.selectedId
        : state.members[0].memberId;

    openMember(firstId);
  }


  function refreshClientRosterState_(members) {
    state.members = Array.isArray(members) ? members : [];
    state.memberMap = {};
    state.rosterButtons = {};

    state.members.forEach(member => {
      if (member && member.memberId) {
        state.memberMap[member.memberId] = member;
      }
    });
  }

  function fillSelect(element, values) {
    element.innerHTML = "";
    values.forEach(value => {
      const option = document.createElement("option");
      option.value = value;
      option.textContent = value;
      element.appendChild(option);
    });
  }

  function renderRoster() {
    const roster = $("roster");
    roster.innerHTML = "";

    state.headshotRenderId += 1;
    const renderId = state.headshotRenderId;

    state.headshotQueue = [];
    state.headshotLoading = false;
    state.rosterButtons = {};

    const query = state.search.trim().toLowerCase();

    const visible = state.members.filter(member => {
      const matchesFilter =
        state.filter === "All" ||
        member.status === state.filter;

      const searchable = [
        member.displayName,
        member.legalName,
        member.professionalName,
        member.department,
        member.roleTitle,
        member.status
      ].join(" ").toLowerCase();

      return matchesFilter && searchable.includes(query);
    });

    const fragment = document.createDocumentFragment();

    visible.forEach(member => {
      const button = document.createElement("button");
      button.type = "button";
      button.className =
        "person" +
        (member.memberId === state.selectedId ? " selected" : "");

      const displayName =
        member.professionalName ||
        member.displayName ||
        member.legalName ||
        "Unnamed member";

      const avatar = document.createElement("div");
      avatar.className = "person-avatar";
      avatar.textContent = companyOSInitials_(displayName);

      queueHeadshotLoad_(avatar, member, renderId);

      const copy = document.createElement("div");
      copy.className = "person-copy";

      const name = document.createElement("div");
      name.className = "person-name";
      name.textContent = displayName;

      const meta = document.createElement("div");
      meta.className = "person-meta";
      meta.textContent = [
        member.roleTitle,
        member.department,
        member.status
      ].filter(Boolean).join(" · ");

      copy.appendChild(name);
      copy.appendChild(meta);
      button.appendChild(avatar);
      button.appendChild(copy);
      button.onclick = () => openMember(member.memberId);

      state.rosterButtons[member.memberId] = button;
      fragment.appendChild(button);
    });

    if (!visible.length) {
      const empty = document.createElement("div");
      empty.className = "no-results";
      empty.textContent = state.members.length
        ? "No roster results match this view."
        : "No company members have been imported yet.";
      fragment.appendChild(empty);
    }

    roster.appendChild(fragment);
  }

  function queueHeadshotLoad_(avatar, member, renderId) {
    const headshotUrl = companyOSHeadshotUrl_(
      getMemberHeadshot_(member),
      160
    );

    if (!headshotUrl) return;

    const cached = state.headshotImageCache[headshotUrl];
    if (cached === "loaded") {
      attachRosterHeadshot_(avatar, headshotUrl, renderId);
      return;
    }

    state.headshotQueue.push({
      avatar,
      headshotUrl,
      renderId
    });

    if (!state.headshotLoading) {
      state.headshotLoading = true;
      setTimeout(processHeadshotQueue_, 0);
    }
  }

  function processHeadshotQueue_() {
    if (!state.headshotQueue.length) {
      state.headshotLoading = false;
      return;
    }

    const batch = state.headshotQueue.splice(0, 8);

    batch.forEach(item => {
      if (item.renderId !== state.headshotRenderId) return;
      if (!item.avatar.isConnected) return;

      const image = new Image();
      image.alt = "";
      image.referrerPolicy = "no-referrer";

      image.onload = function() {
        state.headshotImageCache[item.headshotUrl] = "loaded";

        if (
          item.renderId !== state.headshotRenderId ||
          !item.avatar.isConnected
        ) {
          return;
        }

        item.avatar.innerHTML = "";
        item.avatar.appendChild(image);
      };

      image.onerror = function() {
        state.headshotImageCache[item.headshotUrl] = "error";
      };

      image.src = item.headshotUrl;
    });

    setTimeout(processHeadshotQueue_, 35);
  }

  function attachRosterHeadshot_(avatar, headshotUrl, renderId) {
    const image = new Image();
    image.alt = "";
    image.referrerPolicy = "no-referrer";

    image.onload = function() {
      if (
        renderId !== state.headshotRenderId ||
        !avatar.isConnected
      ) {
        return;
      }

      avatar.innerHTML = "";
      avatar.appendChild(image);
    };

    image.src = headshotUrl;
  }

  function openMember(memberId) {

  const member =
    state.memberMap[memberId];

  if (!member) {
    showError(
      new Error("Company member not found.")
    );
    return;
  }

  updateRosterSelection_(memberId);

  fillForm(member);

  const historyRequestId =
    ++state.performanceHistoryRequestId;

  loadAudit(memberId);

  loadPerformanceHistory_(
    memberId,
    historyRequestId
  );
}

  function newMember() {
    state.selectedId = "";
    fillForm({
      memberId: "",
      status: "Active",
      department: "Cast",
      sameAsLegalName: false,
      mayUsePronounsPublicly: true,
      celebrateBirthday: true,
      shareEmail: true,
      sharePhone: true,
      shareAddress: false,
      shareBirthday: false,
      shareProfessionalName: true,
      sharePronouns: true,
      gmailLabels: []
    });

    $("coreSync").innerHTML =
      syncItem("Contact Sheet","Save the company record first","Unavailable") +
      syncItem("Google Contacts","Not connected yet","Coming next");

    $("stageConnections").innerHTML =
      syncItem("Secondary StageOS systems","Save the company record first","Later");

    renderPerformanceHistoryPreview_({
      department: "Cast",
      roleTitle: ""
    });

    renderRoster();
  }

  function fillForm(member) {
    $("emptyState").classList.add("hidden");
    $("editor").classList.remove("hidden");

    textFields.forEach(id => {
      $(id).value = member[id] == null ? "" : member[id];
    });

    checkboxFields.forEach(id => {
      $(id).checked = Boolean(member[id]);
    });

    $("mayUsePronounsPublicly").value =
      String(Boolean(member.mayUsePronounsPublicly));

    $("celebrateBirthday").value =
      String(Boolean(member.celebrateBirthday));

    $("gmailLabels").value =
      Array.isArray(member.gmailLabels)
        ? member.gmailLabels.join("\n")
        : String(member.gmailLabels || "");

    $("headshot").value = getMemberHeadshot_(member);
    renderGmailLabelPreview_();

    const hasReturningContract =
      Boolean(member.returnDate || member.returnEndDate);

    $("returningContractToggle").checked = hasReturningContract;
    $("returningContractFields").classList.toggle("hidden", !hasReturningContract);

    const name =
      member.professionalName ||
      member.displayName ||
      member.legalName ||
      "New company member";

    $("heroName").textContent = name;

    $("heroContact").textContent =
      [member.email, member.phone].filter(Boolean).join(" · ") ||
      "Email · Phone";

    renderProfilePhoto_(getMemberHeadshot_(member), name);

    const inactive =
      member.status === "Inactive" ||
      member.status === "Alumni";

    $("archiveMember").classList.toggle("hidden", !member.memberId || inactive);
    $("reactivateMember").classList.toggle("hidden", !member.memberId || !inactive);

    applyConditionalFields();
  }

  function updateRosterSelection_(newId) {

  if (
    state.selectedId &&
    state.rosterButtons[state.selectedId]
  ) {
    state.rosterButtons[state.selectedId]
      .classList.remove("selected");
  }

  if (
    newId &&
    state.rosterButtons[newId]
  ) {
    state.rosterButtons[newId]
      .classList.add("selected");
  }

  state.selectedId = newId;
}


  /*************************************************
 * LIVE PERFORMANCE HISTORY
 *************************************************/

function loadPerformanceHistory_(
  memberId,
  requestId
) {
  const section =
    $("performanceHistorySection");

  const grid =
    $("performanceHistoryGrid");

  const description =
    $("performanceHistoryDescription");

  const typeBadge =
    $("performanceHistoryType");

  if (!memberId) {
    section.classList.add("hidden");
    grid.innerHTML = "";
    return;
  }

  const cachedSummary = state.historyCache[memberId];
  if (cachedSummary) {
    renderLivePerformanceHistory_(cachedSummary);
    return;
  }

  section.classList.remove("hidden");
  grid.classList.remove("two-cards");

  description.textContent =
    "Loading this person's performance history...";

  typeBadge.textContent =
    "Loading";

  grid.innerHTML =
    performanceHistoryLoadingCards_();

  google.script.run
    .withSuccessHandler(summary => {
      if (
        requestId !==
        state.performanceHistoryRequestId
      ) {
        return;
      }

      if (
        state.selectedId !== memberId
      ) {
        return;
      }

      state.historyCache[memberId] = summary || {};

      renderLivePerformanceHistory_(
        state.historyCache[memberId]
      );
    })
    .withFailureHandler(error => {
      if (
        requestId !==
        state.performanceHistoryRequestId
      ) {
        return;
      }

      renderPerformanceHistoryError_(
        error
      );
    })
    .getCompanyOSPerformanceHistory(
      memberId
    );
}


function renderLivePerformanceHistory_(
  summary
) {
  const section =
    $("performanceHistorySection");

  const grid =
    $("performanceHistoryGrid");

  const description =
    $("performanceHistoryDescription");

  const typeBadge =
    $("performanceHistoryType");

  if (
    !summary ||
    !summary.showPerformanceHistory
  ) {
    section.classList.add("hidden");
    grid.innerHTML = "";
    return;
  }

  const cards =
    performanceHistoryCardsFromSummary_(
      summary
    );

  section.classList.remove("hidden");

  description.textContent =
    summary.description ||
    "A record of this person's work with the production.";

  typeBadge.textContent =
    performanceHistoryProfileLabel_(
      summary.profileType
    );

  grid.classList.toggle(
    "two-cards",
    cards.length === 2
  );

  if (!summary.recordCount) {
    grid.innerHTML =
      performanceHistoryEmptyHtml_(
        summary
      );

    return;
  }

  grid.innerHTML =
    cards
      .map(
        performanceHistoryCardHtml_
      )
      .join("");
}


function performanceHistoryCardsFromSummary_(
  summary
) {
  const type =
    summary.profileType;

  const workedLabel =
    type === "BAND"
      ? "Performances Played"
      : "Performances Worked";

  const workedCard = {
    label: workedLabel,
    value:
      summary.performancesWorked || 0,

    detail:
      summary.firstPerformanceLabel
        ? "First performance: " +
          summary.firstPerformanceLabel
        : "No first performance recorded yet."
  };

  const timesOutCard = {
    label: "Times Out",
    value:
      summary.timesOut || 0,

    rows:
      performanceHistoryRows_(
        summary.outReasons
      ),

    detail:
      performanceHistoryTimesOutDetail_(
        summary
      )
  };

  if (type === "ACTOR") {
    return [
      workedCard,
      timesOutCard
    ];
  }

  if (
    type ===
    "SWING_UNDERSTUDY"
  ) {
    return [
      workedCard,
      {
        label: "Roles Covered",
        value:
          summary.roleCount || 0,

        rows:
          performanceHistoryRows_(
            summary.rolesCovered
          ),

        detail:
          summary.roleCount
            ? "Role-by-role performance totals."
            : "No covered roles recorded yet."
      },
      timesOutCard
    ];
  }

  if (
    type ===
    "STAGE_MANAGEMENT"
  ) {
    return [
      workedCard,
      {
        label:
          "Stage Management Assignments",

        rows: [
          [
            "Called Show",
            summary.calledShowCount || 0
          ],
          [
            "On Deck",
            summary.deckCount || 0
          ],
          [
            "Body Called",
            summary.bodyCalledCount || 0
          ],
          [
            "Office Shows",
            summary.officeShowCount || 0
          ]
        ],

        detail:
          "Assignment totals across recorded performances."
      },
      timesOutCard
    ];
  }

  if (type === "CREW") {
    return [
      workedCard,
      {
        label: "Times Out",
        value:
          summary.timesOut || 0,

        detail:
          "Crew history tracks the absence and substitute."
      },
      {
        label: "Covered By",
        value:
          summary.substituteCount || 0,

        rows:
          performanceHistoryRows_(
            summary.substitutes
          ),

        detail:
          summary.substituteCount
            ? "Substitute performance totals."
            : "No substitutes recorded yet."
      }
    ];
  }

  if (type === "BAND") {
    return [
      workedCard,
      {
        label: "Times Out",
        value:
          summary.timesOut || 0,

        detail:
          "Band history tracks the absence, not the reason."
      },
      {
        label: "Substitutes",
        value:
          summary.substituteCount || 0,

        rows:
          performanceHistoryRows_(
            summary.substitutes
          ),

        detail:
          summary.substituteCount
            ? "Substitute performance totals."
            : "No substitutes recorded yet."
      }
    ];
  }

  return [];
}


function performanceHistoryRows_(
  items
) {
  if (!Array.isArray(items)) {
    return [];
  }

  return items.map(item => [
    item.label || "",
    item.count || 0
  ]);
}


function performanceHistoryTimesOutDetail_(
  summary
) {
  if (!summary.timesOut) {
    return (
      "No missed performances recorded."
    );
  }

  if (
    summary.profileType ===
      "CREW" ||
    summary.profileType ===
      "BAND"
  ) {
    return (
      "Performance and substitute details will open here."
    );
  }

  return (
    "Reason and performance details will open here."
  );
}


function performanceHistoryProfileLabel_(
  profileType
) {
  const labels = {
    ACTOR:
      "Actor",

    SWING_UNDERSTUDY:
      "Swing / Understudy",

    STAGE_MANAGEMENT:
      "Stage Management",

    CREW:
      "Crew",

    BAND:
      "Band"
  };

  return (
    labels[profileType] ||
    "Performance History"
  );
}


function performanceHistoryCardHtml_(
  card
) {
  const hasValue =
    card.value !== undefined &&
    card.value !== null;

  const valueHtml =
    hasValue
      ? (
          '<div class="performance-stat-value">' +
            escapeHistoryHtml_(
              card.value
            ) +
          "</div>"
        )
      : "";

  const rows =
    Array.isArray(card.rows)
      ? card.rows
      : [];

  const rowsHtml =
    rows.length
      ? (
          '<div class="performance-stat-breakdown">' +
            rows.map(row => (
              '<div class="performance-stat-row">' +
                "<span>" +
                  escapeHistoryHtml_(
                    row[0]
                  ) +
                "</span>" +
                "<strong>" +
                  escapeHistoryHtml_(
                    row[1]
                  ) +
                "</strong>" +
              "</div>"
            )).join("") +
          "</div>"
        )
      : "";

  return (
    '<div class="performance-stat">' +
      '<div class="performance-stat-label">' +
        escapeHistoryHtml_(
          card.label
        ) +
      "</div>" +
      valueHtml +
      rowsHtml +
      '<div class="performance-stat-detail">' +
        escapeHistoryHtml_(
          card.detail || ""
        ) +
      "</div>" +
    "</div>"
  );
}


function performanceHistoryLoadingCards_() {
  return [
    "Performances",
    "Assignments",
    "Times Out"
  ].map(label => (
    '<div class="performance-stat">' +
      '<div class="performance-stat-label">' +
        label +
      "</div>" +
      '<div class="performance-stat-detail">' +
        "Loading..." +
      "</div>" +
    "</div>"
  )).join("");
}


function performanceHistoryEmptyHtml_(
  summary
) {
  return (
    '<div class="performance-stat">' +
      '<div class="performance-stat-label">' +
        "No History Yet" +
      "</div>" +
      '<div class="performance-stat-detail">' +
        escapeHistoryHtml_(
          (
            summary.profileType ===
            "BAND"
          )
            ? "No performances have been recorded for this musician."
            : "No performances have been recorded for this company member."
        ) +
      "</div>" +
    "</div>"
  );
}


function renderPerformanceHistoryError_(
  error
) {
  const section =
    $("performanceHistorySection");

  const grid =
    $("performanceHistoryGrid");

  section.classList.remove("hidden");

  $("performanceHistoryType")
    .textContent =
      "Unavailable";

  $("performanceHistoryDescription")
    .textContent =
      "Performance History could not be loaded.";

  const message =
    error && error.message
      ? error.message
      : String(
          error ||
          "Unknown Performance History error."
        );

  grid.classList.remove(
    "two-cards"
  );

  grid.innerHTML =
    '<div class="performance-stat">' +
      '<div class="performance-stat-label">' +
        "History Unavailable" +
      "</div>" +
      '<div class="performance-stat-detail">' +
        escapeHistoryHtml_(
          message
        ) +
      "</div>" +
    "</div>";
}


function escapeHistoryHtml_(
  value
) {
  return String(
    value == null
      ? ""
      : value
  )
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

  function collectPayload() {
    const payload = {};

    textFields.forEach(id => {
      payload[id] = $(id).value;
    });

    checkboxFields.forEach(id => {
      payload[id] = $(id).checked;
    });

    const professionalName =
      $("professionalName").value.trim();

    const legalName =
      $("legalName").value.trim();

    payload.professionalName = professionalName;
    payload.displayName = professionalName || legalName;
    payload.sameAsLegalName =
      Boolean(legalName) &&
      payload.displayName === legalName;

    payload.mayUsePronounsPublicly =
      Boolean($("sharePronouns").checked);

    payload.shareProfessionalName = true;

    payload.celebrateBirthday =
      $("celebrateBirthday").value === "true";

    payload.returnEndDate = $("returnEndDate").value || "";

    payload.gmailLabels = companyOSParseGmailLabels_();

    return payload;
  }

  function saveMember() {
    setMessage("Saving company record...");

    google.script.run
      .withSuccessHandler(result => {
        state.roster = result.roster || {};
        refreshClientRosterState_(state.roster.members || []);
        state.selectedId = result.member.memberId;
        state.auditCache[state.selectedId] = null;
        state.historyCache[state.selectedId] = null;
        fillForm(result.member);
        renderRoster();
        loadAudit(state.selectedId);

        const historyRequestId =
          ++state.performanceHistoryRequestId;

        loadPerformanceHistory_(
          state.selectedId,
          historyRequestId
        );

        setMessage(
          "Company record saved.",
          "success"
        );
      })
      .withFailureHandler(showError)
      .saveCompanyOSMember(collectPayload());
  }

  function loadAudit(memberId, forceRefresh) {
    if (!memberId) return;

    if (!forceRefresh && state.auditCache[memberId]) {
      renderAudit_(state.auditCache[memberId]);
      return;
    }

    $("connectionsSummary").textContent = "Checking connections…";
    $("connectionsSummary").style.color = "var(--muted)";

    google.script.run
      .withSuccessHandler(audit => {
        state.auditCache[memberId] = audit || {};

        if (state.selectedId !== memberId) return;
        renderAudit_(state.auditCache[memberId]);
      })
      .withFailureHandler(error => {
        if (state.selectedId !== memberId) return;
        showError(error);
      })
      .getCompanyOSConnectionAudit(memberId);
  }

  function renderAudit_(audit) {
    const coreItems = audit.coreSync || [];
    const stageItems = audit.stageOSConnections || [];
    const allItems = coreItems.concat(stageItems);

    $("coreSync").innerHTML =
      coreItems.map(item => syncItem(item.label,item.status,item.action)).join("");

    $("stageConnections").innerHTML =
      stageItems.map(item => syncItem(item.label,item.status,item.action)).join("");

    const needsAttention = allItems.filter(item => {
      const text = [item.status,item.action].join(" ").toLowerCase();
      return !(
        text.includes("connected") ||
        text.includes("up to date") ||
        text.includes("complete") ||
        text.includes("success")
      );
    });

    const healthy = Boolean(allItems.length && !needsAttention.length);

    $("connectionsSummary").textContent = healthy
      ? "✓ All Connected Systems Are Up To Date"
      : needsAttention.length
        ? needsAttention.length + " System" +
          (needsAttention.length === 1 ? "" : "s") +
          " Need Attention"
        : "Connection Audit Available";

    $("connectionsSummary").style.color = healthy
      ? "var(--success)"
      : needsAttention.length
        ? "var(--warning)"
        : "var(--muted)";

    $("connectionsBody").classList.toggle("hidden", healthy);
    $("toggleConnections").classList.toggle("hidden", !healthy);
    $("toggleConnections").textContent = "View";
  }

  function previewContactSheet() {
    const memberId = $("memberId").value;
    if (!memberId) {
      showError(new Error("Save the company record first."));
      return;
    }

    setMessage("Building Contact Sheet preview...");

    google.script.run
      .withSuccessHandler(preview => {
        if (!preview.ready) {
          showError(new Error((preview.errors || []).join("\n")));
          return;
        }

        alert([
          "Contact Sheet preview",
          "",
          "Action: " + preview.action,
          "Target row: " + preview.targetRow,
          preview.targetSection ? "Section: " + preview.targetSection : "",
          preview.targetSubsection ? "Subsection: " + preview.targetSubsection : "",
          "",
          "Name: " + preview.after.name,
          "Pronouns: " + (preview.after.pronouns || "Hidden"),
          "Role: " + preview.after.roleTitle,
          "Phone: " + (preview.after.phone || "Hidden"),
          "Email: " + (preview.after.email || "Hidden")
        ].filter(Boolean).join("\n"));

        setMessage("Contact Sheet preview ready.","success");
      })
      .withFailureHandler(showError)
      .getCompanyOSContactSheetPreview(memberId);
  }

  function applyContactSheet() {
    const memberId = $("memberId").value;
    if (!memberId) {
      showError(new Error("Save the company record first."));
      return;
    }

    if (!confirm(
      "Apply this company record to the Contact Sheet?\n\n" +
      "Only this member's reviewed Contact Sheet record will be changed."
    )) return;

    setMessage("Updating Contact Sheet...");

    google.script.run
      .withSuccessHandler(() => {
        state.auditCache[memberId] = null;
        loadAudit(memberId, true);
        setMessage("Contact Sheet updated successfully.","success");
      })
      .withFailureHandler(showError)
      .applyCompanyOSContactSheetFromDialog(memberId);
  }

  function beginMigration() {
    if (state.migrationBusy) return;

    if (state.migrationReady) {
      applyMigration();
      return;
    }

    setMigrationBusy_(true, "Building Preview...");
    setMessage(
      "Building the CompanyOS migration preview. This can take about a minute...",
      "warning"
    );

    google.script.run
      .withSuccessHandler(result => {
        state.migrationReady = true;
        setMigrationBusy_(false);
        updateMigrationButtons();

        alert([
          "Migration preview ready",
          "",
          "Rows found: " + result.totalRows,
          "New records: " + result.createCount,
          "Existing matches: " + result.updateCount,
          "Warnings: " + result.warningCount,
          "",
          "Review the CompanyOS Migration Preview tab in the Engine workbook.",
          "Uncheck any record you do not want imported.",
          "",
          "Then return here and click Apply Reviewed Import."
        ].join("\n"));

        setMessage(
          "Preview ready. Review the Engine workbook, then apply the checked records.",
          "success"
        );
      })
      .withFailureHandler(error => {
        state.migrationReady = false;
        setMigrationBusy_(false);
        updateMigrationButtons();
        showError(error);
      })
      .previewCompanyOSMigrationFromDialog();
  }

  function applyMigration() {
    if (state.migrationBusy) return;

    if (!confirm(
      "Import every checked row from the reviewed migration preview?\n\n" +
      "CompanyOS People will be backed up before the import runs."
    )) return;

    setMigrationBusy_(true, "Applying Import...");
    setMessage(
      "Applying the reviewed migration. Please keep CompanyOS open...",
      "warning"
    );

    google.script.run
      .withSuccessHandler(result => {
        state.roster = result.roster || {};
        refreshClientRosterState_(state.roster.members || []);
        state.auditCache = {};
        state.historyCache = {};
        state.migrationReady = false;
        state.migrationBusy = false;

        updateMigrationButtons();
        renderRoster();

        alert([
          "CompanyOS migration complete",
          "",
          "Created: " + result.result.created,
          "Updated: " + result.result.updated,
          "Skipped: " + result.result.skipped,
          "Failed: " + result.result.failed
        ].join("\n"));

        setMessage(
          "Migration complete. CompanyOS is now populated from the reviewed records.",
          "success"
        );

        if (state.members.length) {
          const nextId =
            state.selectedId &&
            state.members.some(member => member.memberId === state.selectedId)
              ? state.selectedId
              : state.members[0].memberId;

          openMember(nextId);
        } else {
          showEmpty();
        }
      })
      .withFailureHandler(error => {
        setMigrationBusy_(false);
        updateMigrationButtons();
        showError(error);
      })
      .executeCompanyOSMigrationFromDialog();
  }

  function updateMigrationButtons() {
    let label = "Import Contact Sheet";

    if (state.migrationBusy) {
      label = state.migrationReady
        ? "Applying Import..."
        : "Building Preview...";
    } else if (state.migrationReady) {
      label = "Apply Reviewed Import";
    }

    ["importContactSheet", "emptyImport"].forEach(id => {
      const button = $(id);
      button.textContent = label;
      button.disabled = state.migrationBusy;
    });
  }

  function setMigrationBusy_(isBusy, label) {
    state.migrationBusy = Boolean(isBusy);

    ["importContactSheet", "emptyImport"].forEach(id => {
      const button = $(id);
      button.disabled = state.migrationBusy;

      if (state.migrationBusy && label) {
        button.textContent = label;
      }
    });

    $("addMember").disabled = state.migrationBusy;
    $("emptyAdd").disabled = state.migrationBusy;
  }

  function archiveMember() {
    const memberId = $("memberId").value;
    if (!memberId) return;

    if (!confirm(
      "Archive this company member?\n\n" +
      "The record will remain in CompanyOS and can be reactivated later."
    )) return;

    setMessage("Archiving company member...");

    google.script.run
      .withSuccessHandler(result => {
        state.roster = result.roster || {};
        refreshClientRosterState_(state.roster.members || []);
        state.selectedId = result.member.memberId;
        state.auditCache[state.selectedId] = null;
        state.historyCache[state.selectedId] = null;
        fillForm(result.member);
        renderRoster();
        loadAudit(state.selectedId);
        setMessage("Company member archived.","success");
      })
      .withFailureHandler(showError)
      .archiveCompanyOSMember(memberId);
  }

  function reactivateMember() {
    const memberId = $("memberId").value;
    if (!memberId) return;

    setMessage("Reactivating company member...");

    google.script.run
      .withSuccessHandler(result => {
        state.roster = result.roster || {};
        refreshClientRosterState_(state.roster.members || []);
        state.selectedId = result.member.memberId;
        state.auditCache[state.selectedId] = null;
        state.historyCache[state.selectedId] = null;
        fillForm(result.member);
        renderRoster();
        loadAudit(state.selectedId);
        setMessage("Company member reactivated.","success");
      })
      .withFailureHandler(showError)
      .reactivateCompanyOSMember(memberId);
  }

  function applyConditionalFields() {
    // Professional Name always remains editable.
    // Display Name is maintained automatically when the record is saved.
    $("professionalName").disabled = false;

    $("treatWrap").classList.toggle(
      "hidden",
      $("celebrateBirthday").value !== "true"
    );
  }

  function getMemberHeadshot_(member) {
    if (!member) return "";

    const candidates = [
      member.headshot,
      member.headshotUrl,
      member.headshotURL,
      member.headshotId,
      member.headshotFileId,
      member.profilePhoto,
      member.profilePhotoUrl,
      member.photoUrl,
      member.photoURL,
      member.imageUrl
    ];

    return String(candidates.find(value => String(value || "").trim()) || "").trim();
  }

  function companyOSHeadshotUrl_(value, size) {
    const clean = String(value || "").trim();
    if (!clean) return "";

    if (/^data:image\//i.test(clean) || /^blob:/i.test(clean)) {
      return clean;
    }

    const driveId = companyOSDriveFileId_(clean);
    if (driveId) {
      return "https://drive.google.com/thumbnail?id=" +
        encodeURIComponent(driveId) +
        "&sz=w" + String(size || 400);
    }

    if (/^https?:\/\//i.test(clean)) {
      return clean;
    }

    return "";
  }

  function companyOSDriveFileId_(value) {
    const clean = String(value || "").trim();
    if (!clean) return "";

    if (/^[A-Za-z0-9_-]{20,}$/.test(clean)) {
      return clean;
    }

    const patterns = [
      /\/d\/([A-Za-z0-9_-]{20,})/i,
      /[?&]id=([A-Za-z0-9_-]{20,})/i,
      /\/file\/d\/([A-Za-z0-9_-]{20,})/i
    ];

    for (const pattern of patterns) {
      const match = clean.match(pattern);
      if (match) return match[1];
    }

    return "";
  }

  function companyOSInitials_(name) {
    const words = String(name || "?")
      .trim()
      .split(/\s+/)
      .filter(Boolean);

    if (!words.length) return "?";
    if (words.length === 1) return words[0].charAt(0).toUpperCase();

    return (
      words[0].charAt(0) +
      words[words.length - 1].charAt(0)
    ).toUpperCase();
  }

  function renderProfilePhoto_(headshot, name) {
    const image = $("profilePhotoImage");
    const placeholder = $("profilePhotoPlaceholder");
    const url = companyOSHeadshotUrl_(headshot, 500);

    if (url) {
      image.onload = () => {
        image.classList.remove("hidden");
        placeholder.classList.add("hidden");
      };

      image.onerror = () => {
        image.removeAttribute("src");
        image.classList.add("hidden");
        placeholder.classList.remove("hidden");
        placeholder.textContent = companyOSInitials_(name);
      };

      image.alt = name || "Company member";
      image.referrerPolicy = "no-referrer";
      image.src = url;
    } else {
      image.removeAttribute("src");
      image.classList.add("hidden");
      placeholder.classList.remove("hidden");
      placeholder.textContent = companyOSInitials_(name);
    }
  }

  function editProfilePhoto_() {
    const current = $("headshot").value || "";
    const next = prompt(
      "Paste a headshot URL or Google Drive file ID.",
      current
    );

    if (next === null) return;

    $("headshot").value = next.trim();
    renderProfilePhoto_($("headshot").value, $("heroName").textContent);
  }

  function companyOSParseGmailLabels_() {
    return $("gmailLabels").value
      .split(/\n|,/)
      .map(value => value.trim())
      .filter(Boolean);
  }

  function renderGmailLabelPreview_() {
    const preview = $("gmailLabelPreview");
    if (!preview) return;

    const labels = companyOSParseGmailLabels_();
    preview.innerHTML = "";

    if (!labels.length) {
      const empty = document.createElement("span");
      empty.className = "email-label-empty";
      empty.textContent = "No email labels assigned.";
      preview.appendChild(empty);
      return;
    }

    labels.forEach(label => {
      const chip = document.createElement("span");
      chip.className = "email-label-chip";
      chip.textContent = label;
      preview.appendChild(chip);
    });
  }

  function showEmpty() {
    $("emptyState").classList.remove("hidden");
    $("editor").classList.add("hidden");
  }

  function syncItem(label,status,action) {
    return `
      <div class="sync-item">
        <div style="min-width:0">
          <div class="sync-label">${escapeHtml(label)}</div>
          <div class="sync-status">${escapeHtml(status)}</div>
        </div>
        <div class="tag">${escapeHtml(action)}</div>
      </div>`;
  }

  function setMessage(text,type) {
    $("message").textContent = text || "";
    $("message").className = "message" + (type ? " " + type : "");
  }

  function showError(error) {
    const message =
      error && error.message
        ? error.message
        : String(error || "Unknown CompanyOS error.");

    setMessage(message,"error");
  }

  function escapeHtml(value) {
    return String(value || "")
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;")
      .replace(/'/g,"&#039;");
  }

  $("profilePhotoButton").onclick = editProfilePhoto_;
  $("gmailLabels").oninput = renderGmailLabelPreview_;

  function syncPublicName_() {
    const professionalName =
      $("professionalName").value.trim();

    const legalName =
      $("legalName").value.trim();

    const publicName =
      professionalName ||
      legalName ||
      "New company member";

    // Display Name is intentionally hidden and automatic.
    $("displayName").value =
      professionalName || legalName;

    $("sameAsLegalName").checked =
      Boolean(legalName) &&
      !professionalName;

    $("heroName").textContent = publicName;

    renderProfilePhoto_(
      $("headshot").value,
      publicName
    );
  }

  $("professionalName").oninput = syncPublicName_;
  $("legalName").oninput = syncPublicName_;

  $("email").oninput = updateHeroContact_;
  $("phone").oninput = updateHeroContact_;

  function updateHeroContact_() {
    $("heroContact").textContent =
      [$("email").value.trim(), $("phone").value.trim()]
        .filter(Boolean)
        .join(" · ") ||
      "Email · Phone";
  }

  $("returningContractToggle").onchange = event => {
    $("returningContractFields").classList.toggle("hidden", !event.target.checked);
  };

  $("toggleConnections").onclick = () => {
    const body = $("connectionsBody");
    const opening = body.classList.contains("hidden");
    body.classList.toggle("hidden", !opening);
    $("toggleConnections").textContent = opening ? "Hide" : "View";
  };

  $("search").oninput = event => {
    state.search = event.target.value || "";

    clearTimeout(state.searchTimer);
    state.searchTimer = setTimeout(renderRoster, 120);
  };

  $("filters").onclick = event => {
    const button = event.target.closest("[data-filter]");
    if (!button) return;

    state.filter = button.dataset.filter;

    document.querySelectorAll("[data-filter]").forEach(item => {
      item.classList.toggle("active", item === button);
    });

    renderRoster();
  };

  $("addMember").onclick = newMember;
  $("emptyAdd").onclick = newMember;
  $("importContactSheet").onclick = beginMigration;
  $("emptyImport").onclick = beginMigration;
  $("saveMember").onclick = saveMember;
  $("previewContact").onclick = previewContactSheet;
  $("applyContact").onclick = applyContactSheet;
  $("archiveMember").onclick = archiveMember;
  $("reactivateMember").onclick = reactivateMember;
  $("closeDialog").onclick = () => google.script.host.close();

  $("status").onchange = () => {
    applyConditionalFields();
  };

  $("department").onchange = () => {
    renderPerformanceHistoryPreview_({
      department: $("department").value,
      roleTitle: $("roleTitle").value
    });
  };

  $("roleTitle").oninput = () => {
    renderPerformanceHistoryPreview_({
      department: $("department").value,
      roleTitle: $("roleTitle").value
    });
  };

  $("celebrateBirthday").onchange = applyConditionalFields;

  init();
</script>
