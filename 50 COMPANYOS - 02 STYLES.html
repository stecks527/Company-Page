<style>
:root{
      --navy:#16345f;
      --blue:#245fc5;
      --blue-2:#3975d6;
      --blue-soft:#edf4ff;
      --ink:#1f2937;
      --muted:#6b7280;
      --line:#dce3ee;
      --panel:#ffffff;
      --page:#f4f7fb;
      --danger:#b42318;
      --danger-soft:#fff1f0;
      --success:#18794e;
      --success-soft:#edf9f3;
      --warning:#9a6700;
      --warning-soft:#fff8e6;
      --shadow:0 12px 34px rgba(20,52,95,.09);
      --radius:18px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      overflow:hidden;
      color:var(--ink);
      background:
        radial-gradient(circle at top right, rgba(36,95,197,.08), transparent 34%),
        linear-gradient(180deg,#f8faff 0%,var(--page) 100%);
      font:14px/1.45 Arial,Helvetica,sans-serif;
    }

    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    button:disabled{opacity:.5;cursor:not-allowed}

    .app{
      display:grid;
      grid-template-columns:300px minmax(0,1fr);
      height:100vh;
    }

    .sidebar{
      display:flex;
      flex-direction:column;
      min-width:0;
      background:rgba(255,255,255,.96);
      border-right:1px solid var(--line);
      box-shadow:6px 0 24px rgba(20,52,95,.04);
    }

    .brand{
      padding:22px 20px 17px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(135deg,#ffffff 0%,#f4f8ff 100%);
    }

    .eyebrow{
      color:var(--blue);
      font-size:11px;
      font-weight:800;
      letter-spacing:.14em;
      text-transform:uppercase;
    }

    .brand h1{
      margin:4px 0 2px;
      font-size:25px;
      line-height:1.15;
      letter-spacing:-.02em;
      color:var(--navy);
    }

    .brand-copy{color:var(--muted);font-size:12px}

    .side-tools{padding:15px 16px 12px}
    .search-wrap{position:relative}
    .search{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:11px 12px;
      background:#fff;
      outline:none;
      transition:.15s ease;
    }
    .search:focus{
      border-color:var(--blue);
      box-shadow:0 0 0 3px rgba(36,95,197,.10);
    }

    .filters{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .chip{
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      color:#475467;
      padding:6px 9px;
      font-size:11px;
      font-weight:800;
    }

    .chip.active{
      border-color:var(--blue);
      color:var(--blue);
      background:var(--blue-soft);
    }

    .roster{
      flex:1;
      overflow:auto;
      padding:0 12px 12px;
    }

    .person{
      display:block;
      width:100%;
      margin:0 0 8px;
      padding:12px 13px;
      text-align:left;
      border:1px solid transparent;
      border-radius:13px;
      background:transparent;
      color:inherit;
      transition:.14s ease;
    }

    .person:hover{
      background:#f7f9fc;
      border-color:#e6ebf3;
    }

    .person.selected{
      background:linear-gradient(135deg,#edf4ff,#f7faff);
      border-color:#9ebbea;
      box-shadow:0 6px 14px rgba(36,95,197,.09);
    }

    .person-name{font-weight:800;color:#23324a}
    .person-meta{margin-top:3px;color:var(--muted);font-size:12px}

    .no-results{
      padding:26px 14px;
      text-align:center;
      color:var(--muted);
      font-size:12px;
    }

    .sidebar-actions{
      padding:13px 16px 17px;
      border-top:1px solid var(--line);
      background:#fff;
    }

    .btn{
      border:1px solid var(--line);
      border-radius:11px;
      background:#fff;
      color:#344054;
      padding:9px 13px;
      font-weight:800;
      transition:.14s ease;
    }

    .btn:hover{transform:translateY(-1px);box-shadow:0 5px 12px rgba(20,52,95,.08)}
    .btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
    .btn.primary:hover{background:var(--blue-2)}
    .btn.danger{background:var(--danger-soft);border-color:#f0b4ae;color:var(--danger)}
    .btn.success{background:var(--success-soft);border-color:#9ad6b9;color:var(--success)}
    .btn.full{width:100%}
    .btn + .btn.full{margin-top:8px}

    .main{
      min-width:0;
      overflow:auto;
      padding:24px;
    }

    .empty{
      min-height:calc(100vh - 48px);
      display:grid;
      place-items:center;
    }

    .empty-card{
      width:min(640px,100%);
      padding:44px;
      text-align:center;
      background:rgba(255,255,255,.9);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
    }

    .empty-card h2{
      margin:0 0 8px;
      color:var(--navy);
      font-size:26px;
    }

    .empty-card p{margin:0 auto 22px;color:var(--muted);max-width:440px}

    .editor{max-width:1160px;margin:0 auto}
    .hidden{display:none!important}

    .hero{
      position:relative;
      overflow:hidden;
      display:flex;
      justify-content:space-between;
      gap:22px;
      align-items:flex-start;
      margin-bottom:16px;
      padding:23px 24px;
      color:#fff;
      background:
        linear-gradient(135deg,rgba(22,52,95,.98),rgba(36,95,197,.94));
      border-radius:22px;
      box-shadow:var(--shadow);
    }

    .hero:after{
      content:"";
      position:absolute;
      width:240px;height:240px;
      right:-70px;top:-110px;
      border-radius:50%;
      background:rgba(255,255,255,.08);
    }

    .hero-main{position:relative;z-index:1;min-width:0}
    .hero-kicker{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;opacity:.72}
    .hero h2{
      margin:5px 0 3px;
      font-size:28px;
      line-height:1.1;
      letter-spacing:-.025em;
      overflow-wrap:anywhere;
    }
    .hero-subtitle{opacity:.82;font-size:13px}
    .member-id{display:none;margin-top:11px;font-size:12px;font-weight:800;letter-spacing:.08em;opacity:.72}

    .status-pill{
      position:relative;
      z-index:1;
      flex:none;
      padding:7px 11px;
      border:1px solid rgba(255,255,255,.25);
      border-radius:999px;
      background:rgba(255,255,255,.14);
      backdrop-filter:blur(8px);
      font-size:12px;
      font-weight:800;
    }

    .layout{
      display:grid;
      grid-template-columns:minmax(0,1.15fr) minmax(310px,.85fr);
      gap:16px;
      align-items:start;
    }

    .stack{min-width:0}

    .card{
      margin-bottom:16px;
      padding:18px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:0 8px 24px rgba(20,52,95,.05);
    }

    .card.private{
      border-left:5px solid #d75b50;
      background:linear-gradient(180deg,#fff,#fffafa);
    }

    .card-head{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      margin-bottom:14px;
    }

    .card h3{
      margin:0;
      color:var(--navy);
      font-size:16px;
      letter-spacing:-.01em;
    }

    .section-copy{margin-top:3px;color:var(--muted);font-size:12px}

    .grid2,.grid3{display:grid;gap:12px}
    .grid2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .mt{margin-top:12px}

    label{display:block;color:#475467;font-size:12px;font-weight:800}

    input,select,textarea{
      width:100%;
      margin-top:5px;
      padding:10px 11px;
      border:1px solid var(--line);
      border-radius:10px;
      background:#fff;
      color:var(--ink);
      outline:none;
      transition:.15s ease;
    }

    input:focus,select:focus,textarea:focus{
      border-color:var(--blue);
      box-shadow:0 0 0 3px rgba(36,95,197,.09);
    }

    input:disabled{background:#f2f4f7;color:#7a8492}
    textarea{min-height:76px;resize:vertical}

    .check-row{
      display:flex;
      align-items:center;
      gap:9px;
      width:max-content;
      max-width:100%;
      margin-top:10px;
      padding:8px 10px;
      border:1px solid var(--line);
      border-radius:10px;
      background:#fafbfd;
      color:#475467;
      font-weight:700;
    }

    .check-row input,.toggle input{width:auto;margin:0}

    .sharing{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:8px;
      margin-top:13px;
    }

    .toggle{
      display:flex;
      align-items:center;
      gap:8px;
      min-height:42px;
      padding:9px 10px;
      border:1px solid var(--line);
      border-radius:10px;
      background:#fbfcfe;
      color:#475467;
      font-weight:700;
    }

    .sync-list{display:grid;gap:9px}
    .sync-item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      min-width:0;
      padding:11px 12px;
      border:1px solid var(--line);
      border-radius:11px;
      background:#fbfcfe;
    }

    .sync-label{font-weight:800;color:#344054}
    .sync-status{margin-top:2px;color:var(--muted);font-size:11px}
    .tag{
      flex:none;
      padding:5px 8px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      color:#667085;
      font-size:10px;
      font-weight:800;
    }

    .bottom-bar{
      position:sticky;
      bottom:-24px;
      z-index:5;
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      margin-top:4px;
      padding:14px 0 4px;
      background:linear-gradient(180deg,rgba(244,247,251,0),rgba(244,247,251,.97) 28%);
    }

    .bottom-left,.bottom-right{display:flex;gap:8px;flex-wrap:wrap}
    .message{min-height:20px;margin:2px 2px 7px;color:var(--muted);font-size:12px;font-weight:700}
    .message.error{color:var(--danger)}
    .message.success{color:var(--success)}
    .message.warning{color:var(--warning)}

    .migration-note{
      margin-top:8px;
      color:var(--muted);
      font-size:11px;
      text-align:center;
    }


    /* COMPANYOS v1.3 PROFILE REDESIGN */
    .hero{
      display:grid;
      grid-template-columns:auto minmax(0,1fr) auto;
      gap:20px;
      align-items:center;
      padding:24px;
    }

    .profile-photo{
      position:relative;
      z-index:1;
      width:92px;
      height:92px;
      flex:none;
      overflow:hidden;
      border:3px solid rgba(255,255,255,.34);
      border-radius:22px;
      background:rgba(255,255,255,.14);
      box-shadow:0 10px 26px rgba(7,25,55,.18);
      cursor:pointer;
    }

    .profile-photo img{
      width:100%;
      height:100%;
      display:block;
      object-fit:cover;
    }

    .profile-photo-placeholder{
      width:100%;
      height:100%;
      display:grid;
      place-items:center;
      color:rgba(255,255,255,.9);
      font-size:28px;
      font-weight:800;
    }

    .profile-photo-edit{
      position:absolute;
      right:5px;
      bottom:5px;
      width:26px;
      height:26px;
      display:grid;
      place-items:center;
      border:1px solid rgba(255,255,255,.38);
      border-radius:999px;
      background:rgba(15,39,76,.76);
      color:#fff;
      font-size:12px;
      font-weight:800;
    }

    .hero-profile-line{
      display:flex;
      gap:10px 16px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:8px;
    }

    .hero-inline-field{
      position:relative;
      z-index:1;
      min-width:150px;
    }

    .hero-inline-field.role{min-width:230px}
    .hero-inline-field.department{min-width:190px}

    .hero-inline-field input,
    .hero-inline-field select{
      margin:0;
      padding:4px 24px 4px 0;
      border:0;
      border-bottom:1px solid transparent;
      border-radius:0;
      background:transparent;
      box-shadow:none;
      color:#fff;
      font-size:13px;
      font-weight:700;
    }

    .hero-inline-field input:hover,
    .hero-inline-field select:hover,
    .hero-inline-field input:focus,
    .hero-inline-field select:focus{
      border-bottom-color:rgba(255,255,255,.72);
      box-shadow:none;
    }

    .hero-inline-field select option{color:var(--ink)}

    .hero-contact{
      margin-top:8px;
      color:rgba(255,255,255,.82);
      font-size:12px;
      font-weight:700;
    }

    .status-control{
      position:relative;
      z-index:1;
      min-width:112px;
    }

    .status-control select{
      width:100%;
      margin:0;
      padding:8px 30px 8px 12px;
      border:1px solid rgba(255,255,255,.28);
      border-radius:999px;
      background:rgba(255,255,255,.14);
      color:#fff;
      font-size:12px;
      font-weight:800;
      backdrop-filter:blur(8px);
    }

    .status-control select option{color:var(--ink)}

    .full-width{grid-column:1 / -1}

    .identity-grid{
      display:grid;
      grid-template-columns:1.1fr 1.1fr .8fr;
      gap:12px;
    }

    .contact-grid{
      display:grid;
      grid-template-columns:1fr 1fr 1.35fr;
      gap:12px;
      margin-top:12px;
    }

    .birthday-grid{
      display:grid;
      grid-template-columns:.85fr .85fr 1.3fr;
      gap:12px;
      margin-top:12px;
    }

    .field-with-share{
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      gap:8px;
      align-items:end;
    }

    .mini-share{
      min-width:72px;
      height:41px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      margin-top:5px;
      padding:0 9px;
      border:1px solid var(--line);
      border-radius:10px;
      background:#fbfcfe;
      color:#475467;
      font-size:11px;
      font-weight:800;
    }

    .mini-share input{
      width:auto;
      margin:0;
    }

    .details-layout{
      display:grid;
      grid-template-columns:minmax(0,1.12fr) minmax(320px,.88fr);
      gap:16px;
      align-items:start;
    }

    .right-stack{display:grid;gap:16px}
    .right-stack .card{margin-bottom:0}

    .label-chip-editor{
      min-height:92px;
      line-height:1.65;
    }

    .connections-card{
      padding:0;
      overflow:hidden;
    }

    .connections-head{
      display:flex;
      justify-content:space-between;
      gap:14px;
      align-items:center;
      padding:17px 18px;
      border-bottom:1px solid var(--line);
    }

    .connections-summary{
      display:flex;
      align-items:center;
      gap:9px;
      color:var(--success);
      font-size:12px;
      font-weight:800;
    }

    .connections-body{
      padding:16px 18px 18px;
    }

    .connections-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:10px;
    }

    .connections-grid .sync-item{
      min-height:92px;
      display:block;
    }

    .connections-grid .tag{
      display:inline-block;
      margin-top:10px;
    }

    .history-card{padding:18px}
    .history-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:10px;
      margin-top:14px;
    }

    .history-item{
      min-height:92px;
      padding:14px;
      border:1px solid var(--line);
      border-radius:12px;
      background:#fbfcfe;
    }

    .history-item strong{
      display:block;
      color:#344054;
      margin-bottom:5px;
    }

    .history-item span{
      color:var(--muted);
      font-size:12px;
    }

    .coming-soon{
      padding:5px 9px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#f8fafc;
      color:var(--muted);
      font-size:10px;
      font-weight:800;
    }

    @media(max-width:980px){
      .identity-grid,.contact-grid,.birthday-grid{grid-template-columns:1fr 1fr}
      .details-layout{grid-template-columns:1fr}
      .connections-grid,.history-grid{grid-template-columns:1fr 1fr}
    }

    @media(max-width:680px){
      .hero{grid-template-columns:1fr}
      .profile-photo{width:78px;height:78px}
      .identity-grid,.contact-grid,.birthday-grid,
      .connections-grid,.history-grid{grid-template-columns:1fr}
      .status-control{width:100%}
    }


    /* v1.3.1 — headshots, scrolling, and interaction polish */
    .app,
    .sidebar,
    .main{
      min-height:0;
    }

    .sidebar{
      height:100vh;
      overflow:hidden;
    }

    .roster{
      min-height:0;
      overflow-y:auto;
      overscroll-behavior:contain;
      scrollbar-gutter:stable;
    }

    .main{
      height:100vh;
      min-height:0;
      overflow-y:auto;
      overscroll-behavior:contain;
      scrollbar-gutter:stable;
      -webkit-overflow-scrolling:touch;
    }

    .person{
      display:grid;
      grid-template-columns:46px minmax(0,1fr);
      gap:11px;
      align-items:center;
    }

    .person-copy{min-width:0}

    .person-avatar{
      width:46px;
      height:46px;
      overflow:hidden;
      display:grid;
      place-items:center;
      border:1px solid #d8e1ee;
      border-radius:13px;
      background:linear-gradient(135deg,#edf4ff,#f8fbff);
      color:var(--blue);
      font-size:16px;
      font-weight:800;
      box-shadow:0 4px 10px rgba(20,52,95,.06);
    }

    .person-avatar img{
      width:100%;
      height:100%;
      display:block;
      object-fit:cover;
    }

    .hero-inline-field input,
    .hero-inline-field select{
      cursor:pointer;
      opacity:.96;
      transition:border-color .15s ease, background .15s ease, opacity .15s ease;
    }

    .hero-inline-field input:not(:focus),
    .hero-inline-field select:not(:focus){
      appearance:none;
      -webkit-appearance:none;
    }

    .hero-inline-field:hover input,
    .hero-inline-field:hover select,
    .hero-inline-field input:focus,
    .hero-inline-field select:focus{
      padding-left:7px;
      padding-right:7px;
      background:rgba(255,255,255,.09);
      border-radius:7px;
      opacity:1;
    }

    .email-label-preview{
      display:flex;
      flex-wrap:wrap;
      gap:7px;
      margin-top:10px;
    }

    .email-label-chip{
      display:inline-flex;
      align-items:center;
      min-height:28px;
      padding:5px 9px;
      border:1px solid #cddbf0;
      border-radius:999px;
      background:var(--blue-soft);
      color:var(--blue);
      font-size:11px;
      font-weight:800;
    }

    .email-label-empty{
      color:var(--muted);
      font-size:12px;
    }


    /* v1.3.2 — layout refinement */
    .profile-photo{
      width:116px;
      height:116px;
      border-radius:26px;
    }

    .hero{
      grid-template-columns:auto minmax(0,1fr) auto;
      gap:24px;
      padding:28px 30px;
    }

    .hero-profile-line{
      margin-top:10px;
    }

    .hero-contact{
      margin-top:10px;
      font-size:13px;
    }

    .hero-department{
      margin-top:8px;
      color:rgba(255,255,255,.72);
      font-size:12px;
      font-weight:800;
      letter-spacing:.04em;
    }

    .field-label-row{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:7px;
      margin-bottom:5px;
    }

    .field-label-row > span:first-child{
      font-size:11px;
      font-weight:800;
      color:#475467;
    }

    .inline-share{
      display:inline-flex;
      align-items:center;
      gap:4px;
      padding:0;
      border:0;
      background:transparent;
      color:#667085;
      font-size:10px;
      font-weight:800;
      cursor:pointer;
      white-space:nowrap;
    }

    .inline-share input{
      width:13px;
      height:13px;
      margin:0;
    }

    .identity-grid{
      grid-template-columns:1.05fr 1.05fr .9fr;
    }

    .contact-grid{
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:12px;
    }

    .address-row{
      margin-top:12px;
    }

    .address-row textarea{
      min-height:56px;
    }

    .birthday-grid{
      grid-template-columns:.9fr 1.1fr 1.2fr;
    }

    .details-layout{
      display:block;
    }

    .private-wide{
      width:100%;
    }

    .emergency-row{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:12px;
      margin-top:12px;
    }

    .subsection-title{
      margin:4px 0 0;
      color:#344054;
      font-size:12px;
      font-weight:800;
    }

    .two-card-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
      margin-top:16px;
    }

    .two-card-row .card{
      margin-bottom:0;
    }

    .contract-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
